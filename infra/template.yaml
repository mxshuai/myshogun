AWSTemplateFormatVersion: "2010-09-09"
Description: Visbuild Shopify SaaS - data plane (DynamoDB, Publish Lambda, Scheduler role)

Parameters:
  AppTableName:
    Type: String
    Default: visbuild-shopify-app
  ShopifyTokenSecretPrefix:
    Type: String
    Default: visbuild-shopify/token
  AssetsBucketName:
    Type: String
    Default: ""

Resources:
  AppTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref AppTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  PublishLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AppDataAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:DeleteItem
                Resource:
                  - !GetAtt AppTable.Arn
                  - !Sub "${AppTable.Arn}/index/*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:CreateSecret
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ShopifyTokenSecretPrefix}/*"

  PublishLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-publish"
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 120
      MemorySize: 512
      Role: !GetAtt PublishLambdaRole.Arn
      Environment:
        Variables:
          USE_AWS_DATA_LAYER: "true"
          APP_TABLE_NAME: !Ref AppTableName
          SHOPIFY_TOKEN_SECRET_PREFIX: !Ref ShopifyTokenSecretPrefix
          # AWS_REGION 由 Lambda 运行时自动注入，不可在 Environment 中重复设置
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            console.log("Deploy real bundle: npm run build:lambda", event);
            return { ok: false, message: "Replace ZipFile with built artifact" };
          };

  SchedulerInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokePublishLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt PublishLambda.Arn

  PublishErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Publish Lambda errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref PublishLambda

  AssetsBucket:
    Type: AWS::S3::Bucket
    Condition: CreateAssetsBucket
    Properties:
      BucketName: !Ref AssetsBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Conditions:
  CreateAssetsBucket: !Not [!Equals [!Ref AssetsBucketName, ""]]

Outputs:
  AppTableName:
    Value: !Ref AppTable
  PublishLambdaArn:
    Value: !GetAtt PublishLambda.Arn
  SchedulerRoleArn:
    Value: !GetAtt SchedulerInvokeRole.Arn
  AssetsBucketNameOut:
    Condition: CreateAssetsBucket
    Value: !Ref AssetsBucket
