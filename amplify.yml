# AWS Amplify Hosting：SSR（React Router + vite-plugin-react-router-amplify-hosting）
# 控制台连接 Git 仓库后使用此文件；产物目录必须为 .amplify-hosting
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - "**/*"
  cache:
    paths:
      - .npm/**/*
