# AWS Amplify Hosting：SSR（React Router + vite-plugin-react-router-amplify-hosting）
# 控制台连接 Git 仓库后使用此文件；产物目录必须为 .amplify-hosting
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        # Write selected env vars into runtime-readable .env.production for SSR compute
        - rm -f .env.production
        - env | grep -E '^(SHOPIFY_|SCOPES=|HOST=|USE_AWS_|APP_|PUBLISH_|SCHEDULE_|SCHEDULER_|SHOP_CUSTOM_DOMAIN|ADMIN_AUTH_MODE|ADMIN_API_KEY|ASSETS_BUCKET)' >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - "**/*"
  cache:
    paths:
      - .npm/**/*
